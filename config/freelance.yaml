# ────────────────────────────────────────────────────────────────────
# AI-Job-Scan — FREELANCE / CONTRACT mode search tuning
# ────────────────────────────────────────────────────────────────────
# DATA for the deterministic pipeline in job/job_freelance.py.
# The candidate identity + pay floor live in config/profile.yaml.
# ────────────────────────────────────────────────────────────────────

max_posting_age_days: 3

# Minimum hourly USD rate. Overridden by profile.salary_min_usd_per_hour
# when that is set. Reject gigs whose explicit hourly pay is below this.
min_pay_per_hour_usd: 30

# Core freelance platforms for Serper `site:` queries.
target_sites: &target_sites
  - braintrust.us
  - contra.com
  - lemon.io
  - gun.io
  - malt.com
  - toptal.com
  - wellfound.com
  - arc.dev
  - upwork.com
  - freelancer.com

# ONLY jobs scraped from these domains pass Phase 3 (blocks aggregator spam).
site_allowlist:
  - arc.dev
  - braintrust.us
  - contra.com
  - gun.io
  - lemon.io
  - malt.com
  - toptal.com
  - wellfound.com
  - turing.com
  - upwork.com
  - freelancer.com
  - pangea.ai
  - loopp.com
  - workwall.com
  - botpool.ai
  - jobbers.io
  - kolabtree.com
  - boards.greenhouse.io
  - jobs.lever.co
  - jobs.ashbyhq.com
  - smartrecruiters.com
  - jobs.smartrecruiters.com
  - weworkremotely.com
  - remoteok.com
  - flexjobs.com
  - ziprecruiter.com
  - alignerr.com
  - scale.com
  - outlier.ai

query_clusters:
  - name: "A1 — Voice AI / LLM Freelance [per-site]"
    terms: '("voice AI" OR "LLM engineer" OR "AI agent developer") ("contract" OR "freelance" OR "hourly") -senior -lead'
    num: 20
    sites: *target_sites
    broad: false
  - name: "A2 — RAG / LangChain / FastAPI Freelance [per-site]"
    terms: '("RAG" OR "LangChain" OR "CrewAI" OR "FastAPI" OR "Pinecone") ("contract" OR "freelance" OR "project") "AI engineer" -senior'
    num: 20
    sites: *target_sites
    broad: false
  - name: "A3 — GenAI Entry Freelance [per-site]"
    terms: '"generative AI" OR "LLM developer" OR "AI chatbot" ("freelance" OR "contract") ("junior" OR "entry" OR "0-2 years")'
    num: 20
    sites: *target_sites
    broad: false
  - name: "B1 — Voice AI / Agents Gigs [broad]"
    terms: '"voice AI freelance" OR "LiveKit developer" OR "Deepgram developer" OR "ElevenLabs developer" contract OR hourly -senior -lead -site:glassdoor.co.in -site:id.jobstreet.com -site:jooble.org -site:jobgether.com -site:founditgulf.com'
    num: 20
    sites: ["_broad_"]
    broad: true
  - name: "B2 — LLM / RAG Project Work [broad]"
    terms: '"LLM engineer" OR "RAG developer" OR "AI agent freelance" OR "LangChain developer" ("freelance" OR "contract" OR "project-based") -senior -lead -site:glassdoor.co.in -site:id.jobstreet.com -site:jooble.org'
    num: 20
    sites: ["_broad_"]
    broad: true
  - name: "B3 — AI Startup Contract [broad]"
    terms: '("fractional AI engineer" OR "AI consultant" OR "contract AI engineer") ("junior" OR "entry" OR "0-2 years") -senior -site:glassdoor.co.in -site:id.jobstreet.com'
    num: 20
    sites: ["_broad_"]
    broad: true
  - name: "B4 — Python AI Backend Freelance [broad]"
    terms: '("FastAPI developer freelance" OR "Python AI developer" OR "AI API developer") ("contract" OR "remote freelance") -"data scientist" -"DevOps" -site:glassdoor.co.in -site:id.jobstreet.com -site:jooble.org'
    num: 20
    sites: ["_broad_"]
    broad: true
  - name: "C1 — Braintrust / Contra / Gun.io / Arc [per-site]"
    terms: '"AI engineer" OR "LLM" OR "voice AI" OR "RAG" OR "generative AI" contract OR freelance OR project'
    num: 20
    sites: [braintrust.us, contra.com, gun.io, lemon.io, arc.dev]
    broad: false
  - name: "C2 — Remote AI Job Boards [per-site]"
    terms: '("AI engineer" OR "LLM" OR "machine learning" OR "generative AI" OR "Python AI") ("remote" OR "freelance" OR "contract")'
    num: 20
    sites: [weworkremotely.com, remoteok.com, flexjobs.com]
    broad: false
  - name: "C3 — AI Training / Gig Platforms [per-site]"
    terms: '"AI trainer" OR "LLM trainer" OR "AI engineer" OR "Python" remote contract'
    num: 15
    sites: [turing.com, alignerr.com, scale.com, outlier.ai, pangea.ai, botpool.ai]
    broad: false
  - name: "C4 — Toptal / Malt Elite Freelance [per-site]"
    terms: '"AI" OR "machine learning" OR "LLM" OR "Python" freelance OR contract'
    num: 15
    sites: [toptal.com, malt.com, jobbers.io, kolabtree.com]
    broad: false

