  - '\brag\b'
  - 'langchain'
  - 'llamaindex'
  - 'langgraph'
  - 'crewai'
  - 'openai'
  - 'anthropic'
  - 'claude'
  - '\bgpt\b'
  - 'gemini'
  - 'llama'
  - 'mistral'
  - 'transformer'
  - 'hugging ?face'
  - 'pytorch'
  - 'tensorflow'
  - 'fine.?tun'
  - '\blora\b'
  - 'embedding'
  - 'pinecone'
  - 'weaviate'
  - 'chroma'
  - 'qdrant'
  - 'pgvector'
  - 'vector (database|db|store|search)'
  - 'fastapi'
  - 'agentic'
  - '\bmcp\b'
  - 'whisper'
  - 'deepgram'
  - 'elevenlabs'
  - 'livekit'
  - '\bnlp\b'
  - 'natural language processing'
  - 'machine learning'
  - 'deep learning'
  - 'generative ai'
  - '\bvllm\b'
  - 'inference'
  - 'diffusion model'

# Off-stack titles to hard-reject.
title_reject_terms:
  - 'data analyst'
  - 'business analyst'
  - 'financial analyst'
  - 'data entry'
  - 'sales'
  - 'account executive'
  - 'marketing'
  - 'recruiter'
  - 'customer success'
  - 'customer support'
  - 'technical support'
  - 'solutions? architect'
  - 'sales engineer'
  - 'field engineer'
  - 'support engineer'
  - 'devops engineer'
  - 'site reliability'
  - '\bsre\b'
  - 'security engineer'
  - 'network engineer'
  - 'hardware engineer'
  - 'firmware'
  - 'mechanical engineer'
  - 'electrical engineer'
  - 'qa engineer'
  - 'quality assurance'
  - '\bjava\b'
  - '\.net\b'
  - 'salesforce'
  - 'frontend engineer'
  - 'front.?end developer'
  - 'ios engineer'
  - 'android engineer'
  - 'accountant'
  - 'recruiting'
  - 'people operations'

seniority_reject_terms: [senior, staff, principal, lead, 'head of', director, 'vp', manager, distinguished, fellow, 'sr', 'ii', 'iii', 'iv']

education_reject_tokens:
  - "phd required"
  - "ph.d. required"
  - "ph.d required"
  - "doctorate required"
  - "must have a phd"

# Worldwide-remote gate
remote_pass_tokens: [remote, "work from home", wfh, anywhere, worldwide, globally, distributed, "remote-first"]
remote_reject_tokens: ["on-site only", "onsite only", "must be in office", "must relocate", "in-office", "hybrid"]
geo_lock_tokens:
  - "u.s. only"
  - "us only"
  - "united states only"
  - "us-based only"
  - "must be located in the united states"
  - "must reside in the us"
  - "authorized to work in the us"
  - "us citizen"
  - "security clearance"
  - "uk only"
  - "canada only"
  - "eu only"
  - "europe only"
  - "emea only"
  - "must be based in"

# ── Phase 4 LLM eval ─────────────────────────────────────────────────
eval_system: |
  You are {name}'s worldwide-remote AI/ML job agent. The candidate is
  {location}-based and early-career (~{experience_years} years experience).
  Candidate stack: {stack}
  Key achievements: {metrics}

  You are given, for each job, its structured "location" field AND its FULL raw
  job description. BOTH are evidence — read the raw text, do not rely on the title
  alone. For each job:
  - Infer min_years and max_years STRICTLY from the JD's stated experience
    requirements (use 0 if none is stated). Do NOT guess high. Read the whole
    description — the experience requirement is often past the first paragraph.
  - Set "seniority" to the role's level (intern/junior/mid/senior/lead/staff/principal/unknown).
  - Set "location_ok" by deciding: could a person BASED IN {location} actually hold
    this job? The candidate can only take a role that is legally open to someone
    working from {location}. Weigh the structured "location" field and the raw JD
    text together:
      * TRUE if it is fully worldwide / "remote anywhere" / has no geographic
        restriction, OR remote within a region that INCLUDES {location}
        (e.g. APAC, Asia, or {location} itself named).
      * FALSE if the "location" field names a specific country/region OTHER than
        {location} (e.g. "Remote, United States", "US Remote", "Remote (EMEA)",
        "UK - Remote") AND the JD does not explicitly open it worldwide; OR the JD
        requires foreign work authorization / residency / a specific timezone
        overlap that excludes {location}; OR it is onsite/hybrid in a city outside
        {location}. A country-scoped remote field means country-scoped by
        DEFAULT — do NOT treat a named foreign country as "accessible" just
        because the word "remote" appears.
      * Only when the "location" field is a bare "Remote" with NO country AND the
        JD says nothing about geography should you lean TRUE (a genuine worldwide
        role) — never invent a restriction that isn't written, but never ignore
        one that is.
  - Set is_match=true ONLY if it is a hands-on AI/ML/LLM engineering role that fits
    the candidate's stack, location_ok is true, and the required experience is within
    reach of an early-career candidate.
  - match_score (0-100): reward direct stack overlap (LLM, RAG, agents, Python, ML)
    and early-career fit; penalise seniority and stack mismatch.
  - If is_match=true: drafted_proposal = 3 tight paragraphs (a relevant achievement →
    stack fit → one concrete metric + a call to action), signed as {name}.
  - If is_match=false: rejection_reason = one sentence; drafted_proposal = null.
  {format_instructions}

format_instructions: |
  Return ONLY valid JSON (no markdown fences):
  {"evaluated_jobs":[{"job_title":"string","company":"string","application_url":"string","is_match":true,"match_score":0,"min_years":0,"max_years":null,"seniority":"unknown","location_ok":true,"rejection_reason":"string or null","drafted_proposal":"string or null"}]}
