# ────────────────────────────────────────────────────────────────────
# AI-Job-Scan v2 — WORLDWIDE REMOTE mode
# ────────────────────────────────────────────────────────────────────
# Jobs are fetched from the curated, live-verified company boards in
# config/companies_remote.yaml (Greenhouse/Lever/Ashby JSON APIs) — no
# LinkedIn, no aggregators. This file holds only the deterministic filter
# data + LLM prompts. The candidate identity lives in config/profile.yaml.
# ────────────────────────────────────────────────────────────────────

# Thresholds
max_posting_age_days: 0     # 0 = disabled: a job listed on an ATS board IS open
report_min_score: 50        # only matches scoring >= this reach report_*.json
per_company_cap: 5          # keep at most N relevant jobs per company
min_jd_chars: 200           # drop thin/empty job descriptions
yoe_slack: 1                # allow candidate_years + slack of required experience
jd_eval_chars: 12000        # JD length sent to the LLM — full raw text, not a 3k snippet.
                            # location/remote/experience are verified by the LLM from this
                            # text (+ the structured location field), not from hard-coded
                            # token lists; a 3k truncation used to hide eligibility clauses.
enrich_max_crawls: 30       # v4: max thin-JD, link-only jobs to backfill via crawl4ai per run
eval_max_candidates: 60     # rank, then LLM-evaluate only the top N (cost control)
eval_slots_per_company: 2   # v6: max eval slots ANY one company can claim in that top N
                            # — structurally prevents one big board from flooding the eval
                            # budget (a live run let a handful of companies eat all 60 slots).
watchlist_cap_per_board: 5  # v6: config/companies_remote.yaml boards are SELECTED, not
                            # ingested whole — keep only this many AI/ML-relevant, non-senior
                            # jobs per board (sources.select_relevant). A board contributes
                            # its matching roles or nothing; its raw size no longer matters.

# ── Phase D sources (v3) ─────────────────────────────────────────────
# LinkedIn is DISCOVERY-ONLY: its guest search page has no login wall and
# gives title/company/location/date per card, but its job-detail pages carry
# NO apply-method info without an authenticated session (verified live — the
# Easy-Apply-vs-external-redirect distinction only renders via logged-in JS).
# So every company found here is resolved to its OWN Greenhouse/Lever/Ashby
# board (job/company_resolve.py) and fetched through the same adapters as the
# static registry below — the reported application_url is ALWAYS the
# company's own page, never linkedin.com, by construction.
sources:
  ats: true          # config/companies_remote.yaml
  linkedin: true      # discovery only, see above
  remoteok: true      # remoteok.com/api, tag-filtered — full JD already included
  hn: true            # HN "Ask HN: Who is hiring" monthly thread — full JD already included

linkedin_queries:
  - {keywords: "AI engineer", f_e: "1,2", f_wt: "2"}        # entry+junior, worldwide remote
  - {keywords: "machine learning engineer", f_e: "1,2", f_wt: "2"}
  - {keywords: "LLM engineer", f_wt: "2"}
  - {keywords: "RAG engineer", f_wt: "2"}

# v6 — PRIMARY discovery net is now job-level, not board-level: pipeline.py builds
# ~15 Serper queries at runtime from config/profile.yaml's target_roles x junior
# phrasing x ATS site restriction (jobs.lever.co, jobs.ashbyhq.com, boards.
# greenhouse.io, apply.workable.com) x "remote". A hit is usually already a
# per-job posting URL (verified live: 7-9/10 hits per query), fetched as ONE job
# via its ATS's own per-job endpoint — never a whole board. `serper_job_queries`
# below is only EXTRA queries appended to that runtime-built set; leave empty to
# use the defaults, or add your own site:-restricted queries here.
serper_job_queries: []

junior_tokens: ["junior", "entry level", "entry-level", "0-2 years", "0-1 year",
                "1-2 years", "early career", "new grad", "graduate", "fresher", "intern"]

# ── Phase 3 filters ──────────────────────────────────────────────────

# High-precision AI/ML role titles (matched against the job TITLE).
title_include_terms:
  - 'ai engineer'
  - 'a\.?i\.? engineer'
  - 'ml engineer'
  - 'machine learning engineer'
  - 'machine learning scientist'
  - 'llm engineer'
  - 'genai engineer'
  - 'gen ai engineer'
  - 'generative ai engineer'
  - 'ai/ml engineer'
  - 'ai software engineer'
  - 'software engineer.{0,20}(machine learning|ml|ai)'
  - 'nlp engineer'
  - 'ai agent engineer'
  - 'agent engineer'
  - 'rag engineer'
  - 'voice ai engineer'
  - 'conversational ai'
  - 'ml platform engineer'
  - 'ml infrastructure engineer'
  - 'deep learning engineer'
  - 'applied scientist'
  - 'applied ml'
  - 'research engineer'
  - 'ai researcher'
  - 'prompt engineer'
  - 'computer vision engineer'

# JD-level relevance (matched against the full description). A job passes
# relevance if the TITLE hits above OR the JD hits any of these.
ai_relevance_keywords:
