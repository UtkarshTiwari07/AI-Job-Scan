# ────────────────────────────────────────────────────────────────────
# AI-Job-Scan v2 — WORLDWIDE REMOTE mode
# ────────────────────────────────────────────────────────────────────
# Jobs are fetched from the curated, live-verified company boards in
# config/companies_remote.yaml (Greenhouse/Lever/Ashby JSON APIs) — no
# LinkedIn, no aggregators. This file holds only the deterministic filter
# data + LLM prompts. The candidate identity lives in config/profile.yaml.
# ────────────────────────────────────────────────────────────────────

# Thresholds
max_posting_age_days: 0     # 0 = disabled: a job listed on an ATS board IS open
report_min_score: 50        # only matches scoring >= this reach report_*.json
per_company_cap: 5          # keep at most N relevant jobs per company
min_jd_chars: 200           # drop thin/empty job descriptions
yoe_slack: 1                # allow candidate_years + slack of required experience
jd_eval_chars: 3000         # JD length sent to the LLM

# ── Phase 3 filters ──────────────────────────────────────────────────

# High-precision AI/ML role titles (matched against the job TITLE).
title_include_terms:
  - 'ai engineer'
  - 'a\.?i\.? engineer'
  - 'ml engineer'
  - 'machine learning engineer'
  - 'machine learning scientist'
  - 'llm engineer'
  - 'genai engineer'
  - 'gen ai engineer'
  - 'generative ai engineer'
  - 'ai/ml engineer'
  - 'ai software engineer'
  - 'software engineer.{0,20}(machine learning|ml|ai)'
  - 'nlp engineer'
  - 'ai agent engineer'
  - 'agent engineer'
  - 'rag engineer'
  - 'voice ai engineer'
  - 'conversational ai'
  - 'ml platform engineer'
  - 'ml infrastructure engineer'
  - 'deep learning engineer'
  - 'applied scientist'
  - 'applied ml'
  - 'research engineer'
  - 'ai researcher'
  - 'prompt engineer'
  - 'computer vision engineer'

# JD-level relevance (matched against the full description). A job passes
# relevance if the TITLE hits above OR the JD hits any of these.
ai_relevance_keywords:
  - '\bllm\b'
  - '\brag\b'
  - 'langchain'
  - 'llamaindex'
  - 'langgraph'
  - 'crewai'
  - 'openai'
  - 'anthropic'
  - 'claude'
  - '\bgpt\b'
  - 'gemini'
  - 'llama'
  - 'mistral'
  - 'transformer'
  - 'hugging ?face'
  - 'pytorch'
  - 'tensorflow'
  - 'fine.?tun'
  - '\blora\b'
  - 'embedding'
  - 'pinecone'
  - 'weaviate'
  - 'chroma'
  - 'qdrant'
  - 'pgvector'
  - 'vector (database|db|store|search)'
  - 'fastapi'
  - 'agentic'
  - '\bmcp\b'
  - 'whisper'
  - 'deepgram'
  - 'elevenlabs'
  - 'livekit'
  - '\bnlp\b'
  - 'natural language processing'
  - 'machine learning'
  - 'deep learning'
  - 'generative ai'
  - '\bvllm\b'
  - 'inference'
  - 'diffusion model'

# Off-stack titles to hard-reject.
title_reject_terms:
  - 'data analyst'
  - 'business analyst'
  - 'financial analyst'
  - 'data entry'
  - 'sales'
  - 'account executive'
  - 'marketing'
  - 'recruiter'
  - 'customer success'
  - 'customer support'
  - 'technical support'
  - 'solutions? architect'
  - 'sales engineer'
  - 'field engineer'
  - 'support engineer'
  - 'devops engineer'
  - 'site reliability'
  - '\bsre\b'
  - 'security engineer'
  - 'network engineer'
  - 'hardware engineer'
  - 'firmware'
  - 'mechanical engineer'
  - 'electrical engineer'
  - 'qa engineer'
  - 'quality assurance'
  - '\bjava\b'
  - '\.net\b'
  - 'salesforce'
  - 'frontend engineer'
  - 'front.?end developer'
  - 'ios engineer'
  - 'android engineer'
  - 'accountant'
  - 'recruiting'
  - 'people operations'

seniority_reject_terms: [senior, staff, principal, lead, 'head of', director, 'vp', manager, distinguished, fellow, 'sr', 'ii', 'iii', 'iv']

education_reject_tokens:
  - "phd required"
  - "ph.d. required"
  - "ph.d required"
  - "doctorate required"
  - "must have a phd"

# Worldwide-remote gate
remote_pass_tokens: [remote, "work from home", wfh, anywhere, worldwide, globally, distributed, "remote-first"]
remote_reject_tokens: ["on-site only", "onsite only", "must be in office", "must relocate", "in-office", "hybrid"]
geo_lock_tokens:
  - "u.s. only"
  - "us only"
  - "united states only"
  - "us-based only"
  - "must be located in the united states"
  - "must reside in the us"
  - "authorized to work in the us"
  - "us citizen"
  - "security clearance"
  - "uk only"
  - "canada only"
  - "eu only"
  - "europe only"
  - "emea only"
  - "must be based in"

# ── Phase 4 LLM eval ─────────────────────────────────────────────────
eval_system: |
  You are {name}'s worldwide-remote AI/ML job agent. The candidate is
  {location}-based and early-career (~{experience_years} years experience).
  Candidate stack: {stack}
  Key achievements: {metrics}

  You are given the FULL job description for each job. For each job:
  - Infer min_years and max_years STRICTLY from the JD's stated experience
    requirements (use 0 if none is stated). Do NOT guess high.
  - Set "seniority" to the role's level (intern/junior/mid/senior/lead/staff/principal/unknown).
  - Set "location_ok"=true ONLY if the role is genuinely open to a worldwide-remote,
    {location}-based candidate (false for US/UK/EU-residency-only or onsite-only).
  - Set is_match=true ONLY if it is a hands-on AI/ML/LLM engineering role that fits
    the candidate's stack, location_ok is true, and the required experience is within
    reach of an early-career candidate.
  - match_score (0-100): reward direct stack overlap (LLM, RAG, agents, Python, ML)
    and early-career fit; penalise seniority and stack mismatch.
  - If is_match=true: drafted_proposal = 3 tight paragraphs (a relevant achievement →
    stack fit → one concrete metric + a call to action), signed as {name}.
  - If is_match=false: rejection_reason = one sentence; drafted_proposal = null.
  {format_instructions}

format_instructions: |
  Return ONLY valid JSON (no markdown fences):
  {"evaluated_jobs":[{"job_title":"string","company":"string","application_url":"string","is_match":true,"match_score":0,"min_years":0,"max_years":null,"seniority":"unknown","location_ok":true,"rejection_reason":"string or null","drafted_proposal":"string or null"}]}
