# Worldwide-remote gate (v5): india_mnc now also accepts genuine worldwide-remote
# roles (a candidate in India can take them). These tokens let the deterministic
# gate recognise a real remote signal and reject a role scoped to a foreign country.
remote_pass_tokens: [remote, "work from home", wfh, anywhere, worldwide, globally, distributed, "remote-first"]
remote_reject_tokens: ["on-site only", "onsite only", "must be in office", "must relocate", "in-office", "hybrid"]
