# ────────────────────────────────────────────────────────────────────
# AI-Job-Scan v2 — INDIA MNC / GCC / startup mode
# ────────────────────────────────────────────────────────────────────
# Jobs are fetched from config/companies_india.yaml (Indian AI startups on
# Greenhouse/Lever/Ashby + Workday GCCs + company-domain Serper fallback) —
# no LinkedIn, no Naukri, no aggregators. Filter data + prompts only here.
# ────────────────────────────────────────────────────────────────────

max_posting_age_days: 0
report_min_score: 50
per_company_cap: 5
min_jd_chars: 200
yoe_slack: 1
jd_eval_chars: 3000

