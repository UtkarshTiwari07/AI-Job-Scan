# v6 — PRIMARY discovery net is now job-level, not board-level: pipeline.py builds
# ~15 Serper queries at runtime from config/profile.yaml's target_roles x junior
# phrasing x ATS site restriction x "India". A hit is usually already a per-job
# posting URL (verified live: 7/10 hits on an India multi-site query), fetched as
# ONE job via its ATS's own per-job endpoint — never a whole board.
# `serper_job_queries` below is only EXTRA queries appended to that runtime-built
# set; leave empty to use the defaults, or add your own site:-restricted queries.
serper_job_queries: []

junior_tokens: ["junior", "entry level", "entry-level", "0-2 years", "0-1 year",
                "1-2 years", "early career", "fresher", "new grad", "graduate", "intern"]

