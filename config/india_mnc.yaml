# ────────────────────────────────────────────────────────────────────
# AI-Job-Scan v2 — INDIA MNC / GCC / startup mode
# ────────────────────────────────────────────────────────────────────
# Jobs are fetched from config/companies_india.yaml (Indian AI startups on
# Greenhouse/Lever/Ashby + Workday GCCs + company-domain Serper fallback) —
# no LinkedIn, no Naukri, no aggregators. Filter data + prompts only here.
# ────────────────────────────────────────────────────────────────────

max_posting_age_days: 0
report_min_score: 50
per_company_cap: 5
min_jd_chars: 200
yoe_slack: 1
jd_eval_chars: 12000        # full raw JD to the LLM (not a 3k snippet) — location,
                            # remote-eligibility and experience are verified by the LLM
                            # from this text + the structured location field, not from
                            # hard-coded token lists.
enrich_max_crawls: 60       # v4: max thin-JD, link-only jobs to backfill via crawl4ai per run
                            # (v7: raised 30->60 — JobSpy/Naukri rows sometimes arrive thin
                            # and their detail pages are crawlable)
eval_max_candidates: 60     # rank, then LLM-evaluate only the top N (cost control)
eval_slots_per_company: 2   # v6: max eval slots ANY one company can claim in that top N
                            # — structurally prevents one big board from flooding the eval
                            # budget (a live run let a handful of companies eat all 60 slots).
watchlist_cap_per_board: 5  # v6: config/companies_india.yaml boards are SELECTED, not
                            # ingested whole — keep only this many AI/ML-relevant, non-senior
                            # jobs per board (sources.select_relevant). A board contributes
                            # its matching roles or nothing; its raw size no longer matters.

# ── Phase D sources (v3) ─────────────────────────────────────────────
# LinkedIn is DISCOVERY-ONLY (see config/remote.yaml for why): each company
# found is resolved to its OWN ATS board via job/company_resolve.py, so the
# reported application_url is always the company's own page, never linkedin.com.
sources:
  ats: true           # config/companies_india.yaml
  linkedin: true       # discovery only
  remoteok: false      # RemoteOK skews US/global-remote, little India-specific signal
  hn: false            # same — HN Who's Hiring skews US/remote

linkedin_queries:
  - {keywords: "AI engineer", location: "India", f_e: "1,2"}
  - {keywords: "machine learning engineer", location: "India", f_e: "1,2"}
  - {keywords: "LLM engineer", location: "India"}
  - {keywords: "generative AI engineer", location: "India", f_e: "1,2"}

# v7/v8 — PRIMARY VOLUME source: real job boards via python-jobspy. Delhi NCR is
# STRUCTURALLY invisible to an ATS-only design — a live probe of 40 NCR tech
# companies (Housing.com/REA India, MakeMyTrip, PolicyBazaar, Lenskart, Delhivery,
# Urban Company, Cars24, OYO, Blinkit, BharatPe, ...) found only 3/40 expose a
# clean Greenhouse/Lever/Ashby API (Paytm, Zomato/Eternal, Info Edge — added to
# config/companies_india.yaml). The other 37 post on Naukri/Indeed/their own
# portals. `sites` maps to jobspy's site_name. Requires `pip install python-jobspy`;
# if absent the run prints a loud warning instead of silently losing this net.
#
# v8 — Naukri REMOVED: a live run showed `406 recaptcha required` even from the
# user's own residential IP (my earlier assumption that only datacenter IPs get
# blocked was wrong — verified live). A Serper `site:naukri.com` fallback was
# probed too: only ~2/10 hits are per-job URLs, and a Naukri detail page is a JS
# shell to a plain fetch (no JD text without a browser). No viable route today —
# Naukri-listed NCR employers are reached instead via the Indeed/Google/
# company-targeted searches below. Also v8: `results_wanted` 25->40 (a live run
# showed jobspy_indeed pinned at exactly 25 = the request cap, not real supply —
# Indeed had more to give) and more search-term/location variants for coverage.
jobspy_searches:
  - sites: ["indeed"]
    search_term: "AI engineer OR machine learning engineer junior OR fresher"
    location: "Delhi, India"
    country_indeed: "India"
    results_wanted: 40
    hours_old: 336
  - sites: ["indeed"]
    search_term: "AI engineer OR machine learning engineer junior OR fresher"
    location: "Gurgaon, India"
    country_indeed: "India"
    results_wanted: 40
    hours_old: 336
  - sites: ["indeed"]
    search_term: "AI engineer OR machine learning engineer junior OR fresher"
    location: "Noida, India"
    country_indeed: "India"
    results_wanted: 40
    hours_old: 336
  - sites: ["indeed"]
    search_term: "generative AI engineer OR data scientist fresher OR entry level"
    location: "Bengaluru, India"
    country_indeed: "India"
    results_wanted: 40
    hours_old: 336
  - sites: ["indeed"]
    search_term: "machine learning engineer 0-2 years"
    location: "Bengaluru, India"
    country_indeed: "India"
    results_wanted: 40
    hours_old: 336
  - sites: ["linkedin"]
    search_term: "AI engineer junior"
    location: "Delhi, India"
    linkedin_fetch_description: true
    results_wanted: 40
    hours_old: 336
  - sites: ["linkedin"]
    search_term: "generative AI engineer fresher"
    location: "India"
    linkedin_fetch_description: true
    results_wanted: 40
    hours_old: 336
  - sites: ["google"]
    search_term: "AI engineer"
    google_search_term: "ai engineer jobs delhi ncr fresher"
    results_wanted: 20

