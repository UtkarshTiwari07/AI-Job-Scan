# DATA for the deterministic pipeline in job/job_india_mnc.py.
# This preset is India-centric (Serper region gl:in, India job boards).
# The candidate identity lives in config/profile.yaml.
# ────────────────────────────────────────────────────────────────────

max_posting_age_days: 3

# Extra Serper parameters merged into every query (India region + English).
serper_extra:
  gl: "in"
  hl: "en"

