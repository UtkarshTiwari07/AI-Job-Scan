query_clusters:
  - name: "A1 — LLM/RAG/Agent Engineer India [per-site]"
    terms: '("LLM engineer" OR "RAG engineer" OR "AI agent engineer" OR "generative AI engineer") ("0-2 years" OR "0-1 year" OR "entry level" OR "junior" OR "fresher") India'
    num: 20
    sites: *target_sites
    broad: false
  - name: "A2 — Voice AI / LangChain / FastAPI India [per-site]"
    terms: '("voice AI" OR "LangChain" OR "CrewAI" OR "FastAPI" OR "Pinecone" OR "LiveKit") "AI engineer" OR "software engineer" India'
    num: 20
    sites: *target_sites
    broad: false
  - name: "A3 — Funded AI Startup India [per-site]"
    terms: '("Series B" OR "Series C" OR "unicorn" OR "funded" OR "startup") "AI engineer" OR "ML engineer" ("fresher" OR "entry level" OR "0-2 years") India'
    num: 20
    sites: *target_sites
    broad: false
  - name: "B1 — GenAI Engineer India [broad, AI boards only]"
    terms: '"generative AI engineer" OR "LLM engineer" OR "AI agent developer" India ("0-2 years" OR "freshers" OR "entry level" OR "junior") -"data scientist" -"data analyst" -"business analyst" -"medical" -site:apna.co -site:talent.com -site:qureos.com -site:fresheroffcampus.com -site:simplyhired.co.in -site:ambitionbox.com -site:shine.com -site:monsterindia.com -site:glassdoor.co.in -site:jaabz.com -site:instagram.com'
    num: 20
    sites: ["_broad_"]
    broad: true
  - name: "B2 — Named AI Companies India [broad]"
    terms: '(Sarvam OR Krutrim OR "Observe.AI" OR "Yellow.ai" OR Haptik OR Uniphore OR "Sprinklr" OR "Murf AI" OR "Gnani AI" OR "Slang Labs" OR "PolyAI" OR "Reverie") "AI engineer" OR "backend engineer" ("junior" OR "fresher" OR "0-2") India -site:apna.co -site:talent.com -site:qureos.com -site:glassdoor.co.in'
    num: 20
    sites: ["_broad_"]
    broad: true
  - name: "B3 — YC / Sequoia India AI [broad]"
    terms: '("Y Combinator" OR "YC" OR "Sequoia" OR "Lightspeed" OR "Accel" OR "Nexus") "AI engineer" OR "founding engineer" India ("0-2 years" OR "entry level" OR "fresher") -senior -lead -site:apna.co -site:talent.com -site:glassdoor.co.in -site:qureos.com'
    num: 20
    sites: ["_broad_"]
    broad: true
  - name: "C1 — India AI Startup Career Pages"
    terms: '"AI engineer" OR "software engineer" OR "backend engineer" OR "founding engineer" India ("junior" OR "0-2 years" OR "entry" OR "fresher" OR "new grad")'
    num: 10
    sites: *direct_company_pages
    broad: false
    sites_preformatted: true
  - name: "C2 — Big MNC Career Portals India"
    terms: '("AI engineer" OR "ML engineer" OR "machine learning" OR "LLM" OR "generative AI" OR "AI software engineer") India'
    num: 10
    sites: *mnc_career_pages
    broad: false
    sites_preformatted: true
  - name: "D1 — Python AI Backend India [broad]"
    terms: '("python AI engineer" OR "backend AI" OR "AI infrastructure" OR "LLM platform") India ("0-2 years" OR "junior" OR "fresher") -"data scientist" -"data engineer" -"DevOps" -"SRE" -site:apna.co -site:talent.com -site:qureos.com -site:glassdoor.co.in -site:fresheroffcampus.com -site:simplyhired.co.in'
    num: 20
    sites: ["_broad_"]
    broad: true

